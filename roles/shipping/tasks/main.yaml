  - name: app setup
    include_roles:
      name: common
      tasks_from: app-setup
  
  - name: maven setup
    include_roles:
      name: common
      tasks_from: maven

  - name: import the data
    community.mysql.mysql_db:
      login_user: root 
      login_password: RoboShop@1
      login_host: mysql.nagalakshmi.site
      state: import
      target: "{{ item }}"
    loop:
        - /app/db/schema.sql
        - /app/db/app-user.sql 
        - /app/db/master-data.sql
  - name: system setup
    include_roles:
      name: common
      tasks_from: systemd


